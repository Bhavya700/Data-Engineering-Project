bq_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('DBT_BQ_PROJECT') }}"
      schema: "{{ env_var('DBT_BQ_DATASET', 'gh_analytics') }}"
      threads: 4
      keyfile: "{{ env_var('DBT_BQ_KEYFILE') }}"
      location: us-west1
      priority: interactive
      retries: 1
      timeout_seconds: 300

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('DBT_BQ_PROJECT') }}"
      schema: "{{ env_var('DBT_BQ_DATASET_PROD', 'prod_gh_analytics') }}"
      threads: 4
      keyfile: "{{ env_var('DBT_BQ_KEYFILE') }}"
      location: us-west1
      priority: interactive
      retries: 1
      timeout_seconds: 300
