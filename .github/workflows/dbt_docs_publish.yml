name: dbt-docs-publish

on:
  workflow_dispatch:

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DBT_BQ_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      DBT_BQ_DATASET: ${{ vars.DBT_BQ_DATASET }}
      DBT_BQ_LOCATION: ${{ vars.DBT_BQ_LOCATION }}
      DBT_BQ_KEYFILE: ${{ runner.temp }}/gcp-key.json
      GCS_BUCKET_ARTIFACTS: ${{ vars.GCS_BUCKET_ARTIFACTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required publish configuration
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${GCP_SA_KEY_JSON:-}" ] || missing+=("secrets.GCP_SA_KEY_JSON")
          [ -n "${DBT_BQ_PROJECT:-}" ] || missing+=("vars.GCP_PROJECT_ID")
          [ -n "${DBT_BQ_DATASET:-}" ] || missing+=("vars.DBT_BQ_DATASET")
          [ -n "${DBT_BQ_LOCATION:-}" ] || missing+=("vars.DBT_BQ_LOCATION")
          [ -n "${GCS_BUCKET_ARTIFACTS:-}" ] || missing+=("vars.GCS_BUCKET_ARTIFACTS")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required configuration:\n- %s\n' "${missing[@]}"
            exit 1
          fi
          if [ "${DBT_BQ_LOCATION}" != "us-west1" ]; then
            echo "DBT_BQ_LOCATION must be us-west1 for this project."
            exit 1
          fi
          echo "Using project=${DBT_BQ_PROJECT}, dataset=${DBT_BQ_DATASET}, location=${DBT_BQ_LOCATION}, bucket=${GCS_BUCKET_ARTIFACTS}"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.7.9 google-cloud-bigquery

      - name: Write service account key
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "${GCP_SA_KEY_JSON}" > "${DBT_BQ_KEYFILE}"
          chmod 600 "${DBT_BQ_KEYFILE}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate dbt docs
        working-directory: dbt
        run: |
          set -euo pipefail
          dbt deps --profiles-dir . --project-dir .
          dbt docs generate --profiles-dir . --project-dir .

      - name: Upload docs to GCS
        run: |
          set -euo pipefail
          gsutil -m rsync -r dbt/target "gs://${GCS_BUCKET_ARTIFACTS}/dbt-docs/runs/${GITHUB_RUN_ID}"
          gsutil -m rsync -r dbt/target "gs://${GCS_BUCKET_ARTIFACTS}/dbt-docs/latest"

      - name: Upload dbt target artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target-${{ github.run_id }}
          path: dbt/target
