version: '3'
services:
  airflow-webserver:
    build: .
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/gcp-key.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../logs:/opt/airflow/logs
      - ./gcp-key.json:/opt/airflow/gcp-key.json
      - ../plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./airflow.db:/opt/airflow/airflow.db
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    build: .
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/gcp-key.json
    volumes:
      - ../dags:/opt/airflow/dags
      - ../logs:/opt/airflow/logs
      - ./gcp-key.json:/opt/airflow/gcp-key.json
      - ../plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./airflow.db:/opt/airflow/airflow.db
    depends_on:
      - airflow-init

  airflow-init:
    image: apache/airflow:2.8.1
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    volumes:
      - ../logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./airflow.db:/opt/airflow/airflow.db
